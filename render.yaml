services:
  - type: web
    name: manager-agent-web
    env: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: Dockerfile
  
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: manager-agent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false


